name: 'ProofPack Verify'
description: 'Verify a ProofPack bundle with the ProofPack CLI'

inputs:
  pack_path:
    description: 'Path to .proofpack directory or zip artifact'
    required: true
  node_version:
    description: 'Node.js version to use'
    required: false
    default: '24'
runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node_version }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Verify ProofPack
      shell: bash
      run: pnpm verify -- "${{ inputs.pack_path }}"
