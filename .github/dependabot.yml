version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: '09:00'
      timezone: 'America/Chicago'
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - dependabot
    groups:
      npm-minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: '09:15'
      timezone: 'America/Chicago'
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - dependabot
    groups:
      github-actions-minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
