name: Release Integrity

on:
  workflow_dispatch:

jobs:
  reproducibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reproducible build check
        run: pnpm repro:check

  attestation:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release artifacts
        run: pnpm release:artifacts

      - name: Sign release artifacts
        run: pnpm release:attest

      - name: Verify attestation
        run: pnpm release:attest:verify

      - name: Upload signed release bundle
        uses: actions/upload-artifact@v4
        with:
          name: proofpack-release-integrity
          path: artifacts/release
